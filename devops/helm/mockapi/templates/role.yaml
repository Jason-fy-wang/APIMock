# https://kubernetes.io/docs/reference/access-authn-authz/rbac/
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.role.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
rules:
  {{- with .Values.role.rules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}

---
