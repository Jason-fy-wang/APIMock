# https://kubernetes.io/docs/reference/access-authn-authz/rbac/
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mock-role
  namespace: mockspace
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["get", "watch", "list"]

- apiGroups: [""] # "" indicates the core API group
  resources: ["services"]
  verbs: ["get", "watch", "list"]

- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch", "list"]

- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "watch", "list"]

---
